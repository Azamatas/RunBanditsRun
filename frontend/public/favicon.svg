<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" fill="none">
  <!-- Background circle -->
  <circle cx="32" cy="32" r="32" fill="#e55b2d"/>
  <!-- Running figure (stick figure runner) -->
  <!-- Head -->
  <circle cx="38" cy="14" r="5" fill="white"/>
  <!-- Body -->
  <line x1="38" y1="19" x2="33" y2="33" stroke="white" stroke-width="3" stroke-linecap="round"/>
  <!-- Left arm (back) -->
  <line x1="36" y1="24" x2="24" y2="28" stroke="white" stroke-width="3" stroke-linecap="round"/>
  <!-- Right arm (front) -->
  <line x1="36" y1="24" x2="45" y2="20" stroke="white" stroke-width="3" stroke-linecap="round"/>
  <!-- Left leg (back, extended forward) -->
  <line x1="33" y1="33" x2="44" y2="44" stroke="white" stroke-width="3" stroke-linecap="round"/>
  <line x1="44" y1="44" x2="50" y2="40" stroke="white" stroke-width="3" stroke-linecap="round"/>
  <!-- Right leg (front, pushed back) -->
  <line x1="33" y1="33" x2="25" y2="42" stroke="white" stroke-width="3" stroke-linecap="round"/>
  <line x1="25" y1="42" x2="18" y2="48" stroke="white" stroke-width="3" stroke-linecap="round"/>
</svg>
