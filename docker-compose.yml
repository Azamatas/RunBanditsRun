services:
  db:
    image: postgres:16
    environment:
      POSTGRES_USER: runbandits
      POSTGRES_PASSWORD: runbandits
      POSTGRES_DB: runbandits
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./backend/init_db.sql:/docker-entrypoint-initdb.d/init_db.sql

volumes:
  pgdata: